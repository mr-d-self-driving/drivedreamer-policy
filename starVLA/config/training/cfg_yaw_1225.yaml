run_id: qwenact
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity
wandb_project: llavavla
is_debug: false

ver_1225: 1
act_tok: 8
pretrain_model_2d: null
enable_image_aug: 0
# w_depth
w_depth: 0
# s2 for loading self prediction label
doing_s2: 0
# use video latent (forward once)
w_video_latent: 0
# vit pretrain
vit_pre: 0
# rgb query loss
rgb_query_loss: 0
# depth query loss
gs_query_loss: 0

framework:
  name: QwenFM
  qwenvl:
    base_vlm: /path/to/Qwen3-VL-2B-WorldAction
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14

  action_model:
    action_model_type: DiT-B
    hidden_size: 1024     # 和 DiT 最后的 projection 对应，用于 ActionDecoder
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 4
    state_dim: 4
    future_action_window_size: 8
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 10
    num_target_vision_tokens: 32
    diffusion_model_cfg:    # DiT Transformers 的参数
     # 1024 for pi: proj
      cross_attention_dim: 1024 # VLM 的 dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
    mlp_head: 0
  
  video_model:
    model_name: /path/to/wan2.1/model
    config_path: starVLA/model/modules/video_model/config/wan2.1/wan_civitai.yaml
    # image_sample_size: 1024
    # video_sample_size: 512
    # token_sample_size: 512
    # video_sample_stride: 1
    # video_sample_n_frames: 9

    # not used for now
    random_hw_adapt: True
    training_with_video_token_length: True
    enable_bucket: True
    weighting_scheme: none
    uniform_sampling: True
    train_sampling_steps: 1000
    train_mode: inpaint
    trainable_modules: .
    ckpt_1d: null
  
  gs_model:
    # model
    model_path: /path/to/gs_model.pth
    model_type: STORM-B/8
    input_size: [144, 256]
    gs_dim: 3
    decoder_type: dummy
    disable_grad_checkpointing: 0
    use_sky_token: 1
    use_affine_token: 1
    num_motion_tokens: 16
    use_latest_gsplat: 0

    # loss
    enable_depth_loss: 1
    
    enable_sky_opacity_loss: 1
    sky_depth: 300.
    enable_sky_depth_loss: 0
    sky_opacity_loss_coeff: 0.1
  
    enable_flow_reg_loss: 1
    flow_reg_coeff: 0.005

    enable_perceptual_loss: 1
    perceptual_loss_start_iter: 5000
    perceptual_weight: 0.05

  reward_model:
    # mini act
    action_model_type: DiT-B
    hidden_size: 1024     # 和 DiT 最后的 projection 对应，用于 ActionDecoder
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 1
    state_dim: 1
    future_action_window_size: 8
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 1
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 10
    num_target_vision_tokens: 32
    diffusion_model_cfg:    # DiT Transformers 的参数
     # 1024 for pi: proj
      cross_attention_dim: 1024 # VLM 的 dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
    mlp_head: 0





datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: asv2_conversation_en,asv2_detailed_description_en,asv2_region_captioning_en,coco_internvl_longcap_en,coco_karpathy_train_567_en,coco_negative_gpt4o_en,coco_poetry_zh,coco_rem_en_zh,cocorem_exist_yorn_en,cocotextv2_en,cocotextv2_gpt4o_en,okvqa_en,refcoco_grounding_aug_en,refcoco_grounding_en,tallyqa_coco_en,toloka_grounding_aug_en,vqav2_en,vsr_en
    eval_dataset: aokvqa_cauldron_llava_format
    data_flatten: false
    base_interval: 2
    max_pixels: 50176
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    # control action head
    load_act_data: 1
    
    dataset_py: navsim_dataset
    data_root: navsim_dataset   # root of processed meta pkls; overrides OPENSCENE_DATA_ROOT
    datalist_path: /path/to/mini_meta.json
    split: mini
    # data_mix: bridge_rt_1 # bridge_rt_1
    # action_type: delta_ee
    # CoT_prompt: 
    # CoT_answer: 
    # default_image_resolution: [3, 576, 1024]
    per_device_batch_size: 4
    load_all_data_for_training: true
    # obs: 
    # image_size: [576,1024]
    w_neg_traj: null

    act_norm: 1

  ## 2d world
  video_data:
    load_2d_data: 0
    rgb_meta_dir: /path/to/navsim_video
    sample_n_frames: 9
    sample_size: [144,256]
    text_input: 0
  
  ## 3d gs
  gs_data:
    load_3d_data: 0
    debug: 0
    gs_meta_dir: /path/to/navsim_storm

  reward_data:
    load_reward_data: 0
    reward_meta_dir: /path/to/navsim_reward_1226





trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 10000
  eval_interval: 200000
  learning_rate:
    base: 1e-05
    qwen_vl_interface: 1.0e-05
    rgb_model: 1.0e-05
    action_model: 1.0e-05
    gs_model: 1e-05
    reward_model: 1e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  # pretrained_checkpoint: ./results/Checkpoints/1_need/0601_qwenact_fixqwen_32gpus_lr_1e-3_qformer_36_37/steps_100000/pytorch_model.pt
  # reload_modules: 'action_model,layer_qformer' # warning: this may cause model to not converge
  repeated_diffusion_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 100
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_ckpt: none
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
